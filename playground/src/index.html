<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandbox Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #252526;
      border-bottom: 1px solid #404040;
      min-height: 42px;
    }

    #header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
      white-space: nowrap;
    }

    #header .spacer { flex: 1; }

    #status {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #252526;
      border-right: 1px solid #404040;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .panel {
      padding: 12px;
      border-bottom: 1px solid #404040;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      margin-bottom: 8px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 5px 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 3px;
      color: #d4d4d4;
      outline: none;
      margin-bottom: 8px;
    }

    input:focus, textarea:focus { border-color: #007acc; }

    textarea {
      width: 100%;
      padding: 5px 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 3px;
      color: #d4d4d4;
      outline: none;
      margin-bottom: 8px;
      resize: vertical;
    }

    button {
      padding: 5px 12px;
      font-size: 12px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      color: #fff;
      background: #0e639c;
      transition: background 0.15s;
    }

    button:hover { background: #1177bb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    button.danger { background: #c72e2e; }
    button.danger:hover { background: #e04040; }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .btn-row button { flex: 1; }

    #sandbox-list {
      list-style: none;
      margin-top: 8px;
    }

    #sandbox-list li {
      padding: 6px 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    #sandbox-list li:hover { background: #2a2d2e; }
    #sandbox-list li.selected { background: #094771; }

    .sandbox-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sandbox-state {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .state-running { background: #2ea04370; color: #7ee787; }
    .state-stopped { background: #c7302e50; color: #f08080; }
    .state-other { background: #555; color: #ccc; }

    .sandbox-delete {
      font-size: 10px;
      padding: 2px 6px;
      background: transparent;
      color: #888;
      flex-shrink: 0;
    }

    .sandbox-delete:hover { color: #f44747; background: #3c3c3c; }

    #image-list {
      list-style: none;
      margin-top: 8px;
    }

    #image-list li {
      padding: 4px 8px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #image-list li:hover { background: #2a2d2e; }

    .image-id {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .image-id:hover { color: #569cd6; }

    .image-size {
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
      margin-left: auto;
    }

    .image-delete {
      font-size: 10px;
      padding: 2px 6px;
      background: transparent;
      color: #888;
      flex-shrink: 0;
    }

    .image-delete:hover { color: #f44747; background: #3c3c3c; }

    #center {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #terminal-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #output .cmd { color: #569cd6; }
    #output .stdout { color: #d4d4d4; }
    #output .stderr { color: #f48771; }
    #output .info { color: #6a9955; }
    #output .error { color: #f44747; }
    #output .exit-ok { color: #6a9955; font-size: 11px; }
    #output .exit-fail { color: #f44747; font-size: 11px; }

    #input-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 12px;
      background: #1e1e1e;
      border-top: 1px solid #404040;
    }

    #prompt-label {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      color: #569cd6;
      margin-right: 6px;
      flex-shrink: 0;
    }

    #cmd-input {
      flex: 1;
      padding: 5px 8px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 3px;
      color: #d4d4d4;
      outline: none;
    }

    #cmd-input:focus { border-color: #007acc; }

    #run-btn {
      margin-left: 6px;
      flex-shrink: 0;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 13px;
      text-align: center;
      padding: 24px;
    }

    /* --- File panel resizer --- */

    #file-panel-resizer {
      width: 4px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      position: relative;
    }

    #file-panel-resizer::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -2px;
      right: -2px;
    }

    #file-panel-resizer:hover,
    #file-panel-resizer.dragging {
      background: #007acc;
    }

    /* --- File browser --- */

    #file-panel {
      width: 380px;
      flex-shrink: 0;
      background: #252526;
      border-left: 1px solid #404040;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #file-panel .panel-title {
      padding: 10px 12px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #file-browser-path {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px 8px;
      border-bottom: 1px solid #404040;
    }

    #file-browser-path input {
      flex: 1;
      margin-bottom: 0;
    }

    #file-browser-path button {
      padding: 4px 8px;
      font-size: 11px;
      flex-shrink: 0;
    }

    #file-list-container {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #file-list {
      list-style: none;
    }

    #file-list li {
      padding: 4px 12px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    #file-list li:hover { background: #2a2d2e; }

    .file-icon {
      flex-shrink: 0;
      font-size: 11px;
      width: 16px;
      text-align: center;
      color: #999;
    }

    .file-entry-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-entry-size {
      margin-left: auto;
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
    }

    #file-viewer {
      display: none;
      flex-direction: column;
      overflow: hidden;
      border-top: 1px solid #404040;
    }

    #file-viewer.active {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #file-viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #1e1e1e;
      border-bottom: 1px solid #404040;
      gap: 6px;
    }

    #file-viewer-name {
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #cccccc;
    }

    #file-viewer-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    #file-viewer-actions button {
      padding: 3px 8px;
      font-size: 11px;
    }

    #file-content {
      flex: 1;
      overflow: auto;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 0;
    }

    #file-editor {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    #file-editor.active { display: flex; }

    #file-editor textarea {
      flex: 1;
      resize: none;
      padding: 8px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      outline: none;
      min-height: 0;
    }

    #file-editor-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #252526;
      border-top: 1px solid #404040;
    }

    #file-editor-bar .spacer { flex: 1; }

    #file-editor-bar button { font-size: 11px; padding: 3px 10px; }

    #new-file-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px 8px;
      border-bottom: 1px solid #404040;
    }

    #new-file-bar input {
      flex: 1;
      margin-bottom: 0;
      font-size: 11px;
      padding: 3px 6px;
    }

    #new-file-bar button {
      padding: 3px 8px;
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Sandbox Playground</h1>
    <div class="spacer"></div>
    <span id="status">Not connected</span>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="panel">
        <div class="panel-title">Connection</div>
        <label for="base-url">Base URL</label>
        <input type="text" id="base-url" value="http://localhost:8080" />
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Enter your API key" />
      </div>
      <div class="panel">
        <div class="panel-title">Create Sandbox</div>
        <label for="image-id-input">Image ID (optional)</label>
        <input type="text" id="image-id-input" placeholder="img-..." />
        <label for="setup-cmds-input">Dockerfile Steps (one per line)</label>
        <textarea id="setup-cmds-input" rows="3" placeholder="RUN apt-get update &amp;&amp; apt-get install -y curl&#10;RUN npm install -g typescript"></textarea>
        <div class="btn-row">
          <button id="create-btn">Create</button>
        </div>
      </div>
      <div class="panel" style="flex:1; min-height:120px;">
        <div class="panel-title">
          Sandboxes
          <button id="refresh-btn" style="float:right; padding:2px 8px; font-size:10px;">Refresh</button>
        </div>
        <ul id="sandbox-list"></ul>
      </div>
      <div class="panel" style="flex:1; border-bottom:none; min-height:100px;">
        <div class="panel-title">
          Images
          <button id="images-refresh-btn" style="float:right; padding:2px 8px; font-size:10px;">Refresh</button>
        </div>
        <ul id="image-list"></ul>
      </div>
    </div>
    <div id="center">
      <div id="terminal-area">
        <div id="output">
          <div class="empty-state">Select or create a sandbox to start executing commands.</div>
        </div>
        <div id="input-bar">
          <span id="prompt-label">$</span>
          <input type="text" id="cmd-input" placeholder="Enter command..." disabled />
          <button id="run-btn" disabled>Run</button>
        </div>
      </div>
      <div id="file-panel-resizer"></div>
      <div id="file-panel">
        <div class="panel-title">
          <span>Files</span>
          <button id="file-refresh-btn" style="padding:2px 8px; font-size:10px;">Refresh</button>
        </div>
        <div id="file-browser-path">
          <input type="text" id="file-path-input" value="/" placeholder="/" />
          <button id="file-go-btn">Go</button>
        </div>
        <div id="new-file-bar">
          <input type="text" id="new-file-path" placeholder="path/to/new-file.txt" />
          <button id="new-file-btn">New File</button>
        </div>
        <div id="file-list-container">
          <ul id="file-list"></ul>
        </div>
        <div id="file-viewer">
          <div id="file-viewer-header">
            <span id="file-viewer-name"></span>
            <div id="file-viewer-actions">
              <button id="file-edit-btn">Edit</button>
              <button id="file-close-btn">Close</button>
            </div>
          </div>
          <div id="file-content"></div>
          <div id="file-editor">
            <textarea id="file-editor-textarea"></textarea>
            <div id="file-editor-bar">
              <div class="spacer"></div>
              <button id="file-save-btn">Save</button>
              <button id="file-cancel-btn">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
