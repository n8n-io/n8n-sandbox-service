syntax = "proto3";

package sandbox.runner.v1;

option go_package = "github.com/n8n-io/sandbox-service/internal/api/grpc/pb;runnerpb";

// RunnerRegistry accepts bi-directional streams from sandbox runners.
service RunnerRegistry {
  // Runners maintain this stream and send periodic heartbeats with capacity and health.
  rpc Connect(stream RunnerHeartbeat) returns (stream ControlMessage);
}

message RunnerHeartbeat {
  string runner_id = 1;
  // Base URL the API uses to reach this runner's HTTP API (e.g. http://runner-a:8080).
  string http_base_url = 2;
  bool healthy = 3;
  int32 capacity_total = 4;
  int32 capacity_used = 5;
}

message ControlMessage {
  bool ack = 1;
}
