name: Service Release Validate

on:
  pull_request:
    branches:
      - 'service/release/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate SERVICE_VERSION file
        run: |
          VERSION=$(cat SERVICE_VERSION)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "SERVICE_VERSION contains invalid semver: '$VERSION'"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Run tests
        uses: ./.github/actions/sandbox-service-test

      - name: Build images (amd64, no push)
        run: |
          make docker-api-amd64
          make docker-runner-amd64
