name: SDK Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  # Required to mint an OIDC token for npm Trusted Publishing and provenance.
  id-token: write
  contents: write

jobs:
  publish:
    environment: npm
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'sdk/release/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Node 24 ships with npm >=11.5.1, which is required for npm Trusted
      # Publishing to exchange the OIDC token for a registry auth token. The
      # SDK's minimum supported runtime is set by `engines` and the tsup build
      # target; the Node version used to pack and publish doesn't affect that.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.14.1"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@a0ea98b2dc7d387a59324835f7421c1d5f8357b4 # v6
        with:
          version: 10

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Dry-run publishing
        run: pnpm publish --dry-run

      - name: Publish to npm
        run: pnpm publish

      - name: Create git tag
        working-directory: .
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="sdk/v${VERSION}"
          git tag --force "${TAG}"
          git push --force origin "${TAG}"

      - name: Create GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "sdk/v${VERSION}" \
            --title "@n8n/sandbox-client v${VERSION}" \
            --generate-notes
