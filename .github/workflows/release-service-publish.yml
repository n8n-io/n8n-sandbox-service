name: Service Publish

on:
  pull_request:
    types: [closed]
    branches:
      - 'service/release/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    environment: docker-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat SERVICE_VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        uses: ./.github/actions/sandbox-service-test

      - name: Publish API image
        uses: ./.github/actions/docker-publish
        with:
          image: n8nio/n8n-sandbox-service-api
          dockerfile: Dockerfile.api
          version: ${{ steps.version.outputs.version }}
          extra-tags: stable
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish runner image
        uses: ./.github/actions/docker-publish
        with:
          image: n8nio/n8n-sandbox-service-runner-dind
          dockerfile: Dockerfile.runner-dind
          version: ${{ steps.version.outputs.version }}
          extra-tags: stable
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Firecracker runner image
        uses: ./.github/actions/docker-publish
        with:
          image: n8nio/n8n-sandbox-service-runner-firecracker
          dockerfile: Dockerfile.ee.runner-firecracker
          version: ${{ steps.version.outputs.version }}
          platforms: linux/amd64
          extra-tags: stable
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Create git tag
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="service/v${VERSION}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git tag --force "${TAG}"
          git push --force origin "${TAG}"

      - name: Package Firecracker golden build tarball
        run: |
          chmod +x scripts/package-firecracker-golden-build.sh
          ./scripts/package-firecracker-golden-build.sh \
            --version "${{ steps.version.outputs.version }}" \
            --output "dist/firecracker-golden-build-${{ steps.version.outputs.version }}.tar.gz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "service/v${VERSION}" \
            --title "service v${VERSION}" \
            --notes "## Docker Images

          - \`n8nio/n8n-sandbox-service-api:${VERSION}\`
          - \`n8nio/n8n-sandbox-service-runner-dind:${VERSION}\`
          - \`n8nio/n8n-sandbox-service-runner-firecracker:${VERSION}\` (linux/amd64 only)

          Platforms: API and runner-dind — \`linux/amd64\`, \`linux/arm64\`. Firecracker runner — \`linux/amd64\` only.

          ## Firecracker golden build

          Download \`firecracker-golden-build-${VERSION}.tar.gz\` from the release assets.
          Use it on runner VMs to rebuild the golden snapshot when upgrading the
          Firecracker runner." \
            "dist/firecracker-golden-build-${VERSION}.tar.gz"

      - name: Open version-bump PR against main
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="service/post-release/${VERSION}"

          git fetch origin main
          git checkout -b "${BRANCH}" origin/main

          printf '%s' "${VERSION}" > SERVICE_VERSION
          git add SERVICE_VERSION
          git commit -m "service: bump version to v${VERSION}"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "service: bump version to v${VERSION}" \
            --body "Automated post-release PR to update SERVICE_VERSION on main after publishing v${VERSION}." \
            --label "release/service"
