name: SDK Release Prep

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  prep-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@a0ea98b2dc7d387a59324835f7421c1d5f8357b4 # v6
        with:
          version: 10

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Bump version
        id: bump
        working-directory: sdk
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync lockfile
        working-directory: sdk
        run: pnpm install --lockfile-only

      - name: Create release branch
        run: git push origin HEAD:refs/heads/sdk/release/${{ steps.bump.outputs.version }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: 'sdk: release v${{ steps.bump.outputs.version }}'
          labels: 'release/sdk'
          title: 'sdk: release v${{ steps.bump.outputs.version }}'
          body: |
            Automated release PR for `@n8n/sandbox-client@${{ steps.bump.outputs.version }}`.

            Merging this PR will trigger the SDK publish workflow.
          branch: sdk/release-pr/${{ steps.bump.outputs.version }}
          base: sdk/release/${{ steps.bump.outputs.version }}
          delete-branch: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
