name: Sweep stale E2E VMs

on:
  schedule:
    - cron: "25 4 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    environment: ALL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - name: Sweep stale e2e VMs
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_E2E_RESOURCE_GROUP }}
        run: bash e2e/infra/scripts/sweep-e2e-vms.sh
