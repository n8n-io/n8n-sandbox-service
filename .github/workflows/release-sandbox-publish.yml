name: Sandbox Publish

on:
  pull_request:
    types: [closed]
    branches:
      - 'sandbox/release/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    environment: docker-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Read version
        id: version
        run: |
          VERSION=$(cat SANDBOX_VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish sandbox image
        uses: ./.github/actions/docker-publish
        with:
          image: n8nio/n8n-sandbox-service-sandbox
          dockerfile: Dockerfile.sandbox
          version: ${{ steps.version.outputs.version }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Create git tag
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="sandbox/v${VERSION}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git tag --force "${TAG}"
          git push --force origin "${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "sandbox/v${VERSION}" \
            --title "sandbox v${VERSION}" \
            --notes "## Docker Image

          - \`n8nio/n8n-sandbox-service-sandbox:${VERSION}\`

          Platforms: \`linux/amd64\`, \`linux/arm64\`"

      - name: Open version-bump PR against main
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="sandbox/post-release/${VERSION}"

          git fetch origin main
          git checkout -b "${BRANCH}" origin/main

          printf '%s' "${VERSION}" > SANDBOX_VERSION
          git add SANDBOX_VERSION
          git commit -m "sandbox: bump version to v${VERSION}"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "sandbox: bump version to v${VERSION}" \
            --body "Automated post-release PR to update SANDBOX_VERSION on main after publishing v${VERSION}." \
            --label "release/sandbox"
