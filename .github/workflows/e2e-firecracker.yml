name: E2E Tests (Firecracker / Azure VM)

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  id-token: write
  contents: read

concurrency:
  group: e2e-firecracker-${{ github.ref }}
  cancel-in-progress: true

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_E2E_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_E2E_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

jobs:
  e2e-firecracker:
    runs-on: ubuntu-latest
    environment: e2e
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e-firecracker')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Provision Azure VM
        id: vm
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_E2E_RESOURCE_GROUP }}
          E2E_PEER_VM_ENABLED: "true"
        run: bash e2e/infra/scripts/provision-firecracker-e2e-vm.sh

      - name: Run Firecracker e2e tests
        env:
          VM_IP: ${{ steps.vm.outputs.vm_ip }}
          VM_PRIVATE_IP: ${{ steps.vm.outputs.vm_private_ip }}
          PEER_VM_PRIVATE_IP: ${{ steps.vm.outputs.peer_vm_private_ip }}
          SSH_KEY_PATH: ${{ steps.vm.outputs.ssh_key_path }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=6"
          ssh $SSH_OPTS -i "$SSH_KEY_PATH" "azureuser@${VM_IP}" bash -s << 'EOF'
          set -euxo pipefail
          export PATH=/usr/local/go/bin:$HOME/go/bin:$PATH

          cd ~/project
          bash e2e/run-firecracker.sh
          sleep 2
          bash e2e/run-firecracker-idle-ttl.sh
          EOF

          sleep 2
          bash e2e/run-firecracker-two-runners-azure.sh

      - name: Collect logs on failure
        if: failure()
        continue-on-error: true
        env:
          VM_IP: ${{ steps.vm.outputs.vm_ip }}
          SSH_KEY_PATH: ${{ steps.vm.outputs.ssh_key_path }}
        run: bash e2e/infra/scripts/collect-firecracker-e2e-vm-logs.sh

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-firecracker-logs
          path: /tmp/e2e-firecracker-artifacts/
          retention-days: 7

      - name: Cleanup Azure VM
        if: always()
        continue-on-error: true
        run: bash e2e/infra/scripts/cleanup-e2e-vm.sh
