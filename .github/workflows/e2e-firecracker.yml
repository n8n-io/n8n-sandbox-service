name: E2E Tests (Firecracker / Azure VM)

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  id-token: write
  contents: read

concurrency:
  group: e2e-firecracker-${{ github.ref }}
  cancel-in-progress: true

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_E2E_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_E2E_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

jobs:
  e2e-firecracker:
    runs-on: ubuntu-latest
    environment: e2e
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e-firecracker')
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_E2E_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_E2E_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_E2E_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Run Firecracker e2e tests
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_E2E_RESOURCE_GROUP }}
        run: bash e2e/run-firecracker-azure.sh

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-firecracker-logs
          path: /tmp/e2e-firecracker-artifacts/
          retention-days: 7
