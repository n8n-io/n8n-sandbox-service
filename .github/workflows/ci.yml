name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.0"

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Build
        run: make all

      - name: Test
        run: make test

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: sdk

      - name: Typecheck
        run: pnpm typecheck
        working-directory: sdk

      - name: Build
        run: pnpm build
        working-directory: sdk

      - name: Test
        run: pnpm test
        working-directory: sdk

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image (amd64)
        run: make docker-amd64

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.0"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 10

      - name: Run e2e tests
        run: PRIVILEGED=1 e2e/run.sh

  # This job is required by GitHub branch protection rules.
  # PRs cannot be merged unless this job passes.
  required-checks:
    name: Required Checks
    needs: [check, sdk, docker, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate required checks
        run: |
          echo "Results: $RESULTS"
          for result in $(echo "$RESULTS" | jq -r '.[] | .result'); do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more required checks failed or were cancelled"
              exit 1
            fi
          done
          echo "All required checks passed"
        env:
          RESULTS: ${{ toJSON(needs) }}
