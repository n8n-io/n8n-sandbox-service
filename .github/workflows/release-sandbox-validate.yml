name: Sandbox Release Validate

on:
  pull_request:
    branches:
      - 'sandbox/release/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ vars.RUNNER_PROVIDER == 'github' && 'ubuntu-latest' || 'blacksmith-4vcpu-ubuntu-2204' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate SANDBOX_VERSION file
        run: |
          VERSION=$(cat SANDBOX_VERSION)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "SANDBOX_VERSION contains invalid semver: '$VERSION'"
            exit 1
          fi
          echo "Version: $VERSION"

  e2e:
    uses: ./.github/workflows/e2e.yml

