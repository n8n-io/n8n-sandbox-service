apiVersion: v1
kind: Service
metadata:
  name: {{ include "n8n-sandbox-service.apiName" . }}
  labels:
    {{- include "n8n-sandbox-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "n8n-sandbox-service.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.api.service.grpcPort }}
      targetPort: grpc
