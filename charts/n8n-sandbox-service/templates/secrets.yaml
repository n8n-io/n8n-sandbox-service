{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n-sandbox-service.authSecretName" . }}
  labels:
    {{- include "n8n-sandbox-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKeys.apiKeys }}: {{ .Values.auth.generated.apiKeys | quote }}
  {{ .Values.auth.secretKeys.runnerRegistrationToken }}: {{ .Values.auth.generated.runnerRegistrationToken | quote }}
  {{ .Values.auth.secretKeys.runnerApiKey }}: {{ .Values.auth.generated.runnerApiKey | quote }}
  {{ .Values.auth.secretKeys.runnerApiKeys }}: {{ .Values.auth.generated.runnerApiKeys | quote }}
{{- end }}
