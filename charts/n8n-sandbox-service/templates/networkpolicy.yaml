{{- if .Values.networkPolicy.enabled }}
{{- $sysboxRunnerEnabled := and .Values.sysboxRunner.enabled (eq .Values.dataPlane.mode "sysbox") -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "n8n-sandbox-service.apiName" . }}
  labels:
    {{- include "n8n-sandbox-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "n8n-sandbox-service.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: http
          protocol: TCP
      {{- with .Values.networkPolicy.api.httpIngressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if or $sysboxRunnerEnabled .Values.networkPolicy.api.grpcIngressFrom }}
    - ports:
        - port: grpc
          protocol: TCP
      from:
        {{- if $sysboxRunnerEnabled }}
        - podSelector:
            matchLabels:
              {{- include "n8n-sandbox-service.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "sysbox-runner") | nindent 14 }}
        {{- end }}
        {{- with .Values.networkPolicy.api.grpcIngressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    {{- end }}
{{- if $sysboxRunnerEnabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "n8n-sandbox-service.sysboxRunnerName" . }}
  labels:
    {{- include "n8n-sandbox-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: sysbox-runner
spec:
  podSelector:
    matchLabels:
      {{- include "n8n-sandbox-service.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "sysbox-runner") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: http
          protocol: TCP
        - port: control-grpc
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- include "n8n-sandbox-service.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "api") | nindent 14 }}
        {{- with .Values.networkPolicy.sysboxRunner.ingressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
