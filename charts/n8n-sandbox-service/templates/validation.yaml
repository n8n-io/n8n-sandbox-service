{{- if not (has .Values.dataPlane.mode (list "sysbox" "external")) -}}
{{- fail "dataPlane.mode must be one of: sysbox, external" -}}
{{- end -}}
{{- if not (has .Values.tls.mode (list "existingSecret" "certManager")) -}}
{{- fail "tls.mode must be one of: existingSecret, certManager" -}}
{{- end -}}
{{- if not .Values.auth.existingSecret -}}
{{- range $key := list "apiKeys" "runnerRegistrationToken" "runnerApiKey" "runnerApiKeys" -}}
{{- $stringValue := default "" (index $.Values.auth.generated $key) | toString | trim -}}
{{- if or (eq $stringValue "") (eq (lower $stringValue) "changeme") -}}
{{- fail (printf "auth.generated.%s must be set to a non-placeholder value when auth.existingSecret is empty" $key) -}}
{{- end -}}
{{- end -}}
{{- end -}}
